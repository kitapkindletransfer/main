<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud File Share</title>

  <script src="https://js.puter.com/v2/"></script>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:40px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:10px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .upload{
      text-align:center;
      border:2px dashed #3498db;
      padding:30px;
      border-radius:10px;
    }

    .files{
      margin-top:30px;
    }

    .file{
      background:#fafafa;
      padding:15px;
      border-radius:8px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button,a{
      padding:8px 14px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      text-decoration:none;
      color:white;
      margin-left:5px;
    }

    .download{
      background:#27ae60;
    }

    .delete{
      background:#e74c3c;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Cloud File Share</h1>

  <div class="upload">
    <input type="file" id="fileInput" multiple>
  </div>

  <div class="files" id="files"></div>

</div>

<script src="https://js.puter.com/v2/"></script>

<script>
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

let files = [];

// Load saved files when page opens
window.onload = async () => {
    const saved = await puter.kv.get("my_files");
    files = saved || [];
    renderFiles();
};

// Upload file
fileInput.addEventListener("change", async (e) => {
    const selected = Array.from(e.target.files);

    for (const file of selected) {

        // Upload to Puter
        const uploaded = await puter.fs.upload(file);

        // Save metadata
        files.push({
            name: file.name,
            path: uploaded.path
        });
    }

    await puter.kv.set("my_files", files);

    renderFiles();
});

// Render list
function renderFiles() {

    fileList.innerHTML = "";

    if (files.length === 0) {
        fileList.innerHTML = "<p>No files uploaded</p>";
        return;
    }

    files.forEach((f, index) => {

        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
            <span>${f.name}</span>

            <div>
                <a class="download-btn"
                   href="https://puter.site${f.path}"
                   target="_blank">
                   Download
                </a>

                <button onclick="deleteFile(${index})">
                    Delete
                </button>
            </div>
        `;

        fileList.appendChild(div);
    });
}

// Delete file
async function deleteFile(index) {

    const file = files[index];

    await puter.fs.delete(file.path);

    files.splice(index, 1);

    await puter.kv.set("my_files", files);

    renderFiles();
}
</script>
</body>
</html>
